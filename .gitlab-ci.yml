stages:
  - sync
gmail-sync:
  stage: sync
  resource_group: gmail-sync
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - |
      curl --fail --silent --show-error \
        -X POST "$APP_URL/api/gmail/sync" \
        -H "Authorization: Bearer $SYNC_SECRET" \
        -H "Content-Type: application/json"